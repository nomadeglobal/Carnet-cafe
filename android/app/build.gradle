plugins {
    id 'com.android.application'
}

android {
    namespace 'fr.carnetcafe.app'
    compileSdk 35

    defaultConfig {
        applicationId "fr.carnetcafe.app"
        minSdk 24
        targetSdk 35
        versionCode 5
        versionName "1.4"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.core:core:1.13.1'
}
